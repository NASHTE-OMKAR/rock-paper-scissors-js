<!DOCTYPE html>
<html lang="en">

<head>
    <title>Rock and Roll</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <h1>Rock Paper Scssior</h1>
    <div class="choicses">
        <div class="choise" id="paper">
            <img src=".Paper.png" alt="">

        </div>
        <div class="choise" id="rock">
            <img src=".rock.png" alt="">
        </div>
        <div class="choise" id="scss">
            <img src=".Scss.png" alt="">
        </div>

    </div>

    <div class="score-bord">
        <div class="score">
            <p id="user">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="com">0</p>
            <p>Computer</p>
        </div>

    </div>

    <div class="msg-con">
        <p id="ycm">Your Choice</p>
        <p id="msg">ROCK and ROLL</p>
        <p id="ccm">Computer Choice</p>
    </div>

    <div id="RESET">
        <h3 id="re">RESET</h3>
    </div>


    <script src="app.js"></script>
</body>

</html>
